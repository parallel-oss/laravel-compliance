name: Generate Enums

on:
  # workflow_dispatch:
  # schedule:
  #   - cron: '0 8 * * 1'

jobs:
  generate-enums:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, json
          tools: composer

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Import Standards
        run: |
          php vendor/bin/testbench security:import-asvs --output=resources/standards/owasp-asvs-5.0.0.json
          php vendor/bin/testbench security:import-wstg --output=resources/standards/owasp-wstg-latest.json

      - name: Generate Package Enums
        run: |
          php vendor/bin/testbench security:generate-enums "resources/standards/*.json" --namespace="Parallel\\Compliance\\Enums" --output=src/Enums

      - name: Commit Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update generated compliance standards"
          file_pattern: "resources/standards/*.json src/Enums/*.php"
